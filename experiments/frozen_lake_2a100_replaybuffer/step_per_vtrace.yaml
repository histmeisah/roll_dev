# ==============================================================================
# FROZENLAKE OFF-POLICY - Step Level + Standard PER + V-trace
# ==============================================================================
# Purpose: Test standard PER with V-trace off-policy correction
# Hardware: 2x A100 40GB
# Key Features:
#   - Reward-based priority sampling (priority = |reward|)
#   - V-trace advantage estimation for off-policy correction
#   - Truncated importance sampling (rho_bar, c_bar)
# EnvManager: StepEnvManager (step level)
#
# V-trace (IMPALA paper, Espeholt et al. 2018):
#   - Corrects for policy drift between behavior and target policy
#   - Truncated importance sampling for stability
#   - Well-suited for off-policy learning with replay buffer
# ==============================================================================
defaults:
  - ../../ROLL/examples/config/traj_envs@_here_
  - ../../ROLL/examples/config/deepspeed_zero@_here_
  - ../../ROLL/examples/config/deepspeed_zero2@_here_
  - ../../ROLL/examples/config/deepspeed_zero2_cpuoffload@_here_
  - ../../ROLL/examples/config/deepspeed_zero3@_here_
  - ../../ROLL/examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "step_per_vtrace"
seed: 42
timestamp: ${oc.env:TRAINING_TIMESTAMP,${now:%Y%m%d_%H%M%S}}
base_output_dir: /mnt/nasdata/weiyu/roll_dev/experiments/frozen_lake_2a100_replaybuffer/output
logging_dir: ${base_output_dir}/${timestamp}/logs
output_dir: ${base_output_dir}/${timestamp}
render_save_dir: ${base_output_dir}/${timestamp}/render
system_envs:
  USE_MODELSCOPE: '1'

track_with: wandb
tracker_kwargs:
  project: roll-frozen-lake-2a100
  name: ${timestamp}_${exp_name}
  notes: "Off-Policy: Step level, Standard PER + V-trace"
  tags: [agentic, roll, frozen_lake, replay, step, per, vtrace, 2a100]
  mode: offline
  dir: ${base_output_dir}/${timestamp}/wandb

checkpoint_config:
  type: file_system
  output_dir: ${base_output_dir}/${timestamp}/models/${exp_name}

# =============================================================================
# TRAINING CONFIGURATION
# =============================================================================

num_gpus_per_node: 2

max_steps: 400
save_steps: 10000
logging_steps: 1
eval_steps: 10
resume_from_checkpoint: false

train_from_replay_only: false
batch_adjust_mode: auto
async_generation_ratio: 1

rollout_batch_size: 128
val_batch_size: 128
sequence_length: 2048

advantage_clip: 20              # 从0.2增大到20，避免过度限制学习
ppo_epochs: 1
# V-trace advantage estimator for off-policy correction
adv_estimator: "vtrace"
init_kl_coef: 0.1               # KL散度约束初始系数 (防止策略剧烈变化)
use_kl_loss: true               # 启用KL Loss正则化
kl_loss_coef: 0.05              # KL Loss系数 (增强约束)
whiten_advantages: true
entropy_loss_coef: 0.01         # 熵正则化系数 (防止entropy collapse)
max_grad_norm: 1.0
gamma: 0.99

# V-trace Configuration
vtrace:
  rho_bar: 1.5                       # Truncation for importance sampling ratio
  c_bar: 1.0                         # Truncation for trace coefficient

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================

pretrain: /mnt/nasdata/weiyu/llm_model/qwen_models/Qwen2.5-0.5B-Instruct
reward_pretrain: /mnt/nasdata/weiyu/llm_model/qwen_models/Qwen2.5-0.5B-Instruct

actor_train:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 2  # Reduced from 4 to save GPU memory
    gradient_accumulation_steps: 64  # Increased to maintain effective batch size
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero2}
  device_mapping: list(range(0,1))
  infer_batch_size: 2  # Reduced from 4

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: 128
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.85
      block_size: 16
      load_format: auto
  device_mapping: list(range(1,2))

reference:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: list(range(0,1))
  infer_batch_size: 4

# Critic for V-trace value estimation (shares GPU 0 with actor_train)
# FIX: Increased batch_size and removed CPU offload to fix grad_norm=0 issue
critic:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false  # Keep enabled for memory efficiency
    dtype: bf16
    model_type: trl  # Required for value model (AutoModelForCausalLMWithValueHead)
  training_args:
    learning_rate: 1.0e-5
    weight_decay: 0
    per_device_train_batch_size: 4  # FIX: Increased from 1 to 4 (official uses 2)
    gradient_accumulation_steps: 32  # FIX: Reduced from 128 to 32 (official uses 32)
    warmup_steps: 20  # Increased warmup
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero2}  # FIX: Removed CPU offload (was causing grad_norm=0)
  device_mapping: list(range(0,1))
  infer_batch_size: 4

# FIX: Add critic warmup to let value function stabilize before actor training
critic_warmup: 50

# =============================================================================
# ENVIRONMENT CONFIGURATION - FrozenLake (Step Level)
# =============================================================================

action_pattern: <answer>(.*?)</answer>
think_action_pattern: <think>(.*?)</think>\s*<answer>(.*?)</answer>
user_prompt_no_think_format: <answer> [your answer] </answer>
user_prompt_think_format: <think> [Your thoughts] </think> <answer> [your answer] </answer>

max_tokens_per_step: 128
max_actions_per_traj: 10

reward_normalization:
  grouping: traj_group_id
  method: mean_std

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 16
  num_env_groups: 64
  group_size: 2
  tags: [FrozenLake]
  num_groups_partition: [64]

val_env_manager:
  max_env_num_per_worker: 32
  num_env_groups: 128
  group_size: 1
  tags: [FrozenLake]
  num_groups_partition: [128]

custom_envs:
  FrozenLake:
    env_type: frozen_lake
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_no_think_format}
    agent_system_template: "You are an agent solving the FrozenLake puzzle. Output must be wrapped as <answer>Action</answer>."
    # StepEnvManager template variables
    agent_template: |
      {env_instruction}
      Current step: {current_step}
      Grid state:
      {current_observation}
      History ({history_length} steps): {history}
      Respond with one action token only, within {max_response_length} tokens.
    reward_template: "Feedback: Your previous action received reward {reward}. Revise your plan if needed."
    env_manager_cls: roll.pipeline.agentic.env_manager.step_env_manager.StepEnvManager
    history_length: 3
    use_thread_lock: true
    env_config:
      env_instruction: "You are solving the FrozenLake puzzle. Forbid the whole and go to the target. You may move to the unintended direction due to the slippery ice. The answer must be one of action in a turn, format is <answer>Right</answer>"
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      is_slippery: false

# =============================================================================
# OFF-POLICY MONITORING (Required for V-trace)
# =============================================================================
# V-trace requires behavior policy log probs to compute importance ratios

offpolicy_monitor:
  enabled: true
  save_behavior_log_probs: true      # Required for V-trace
  monitor_fresh_batch: true
  monitor_replay_batch: true
  monitor_interval: 1

# =============================================================================
# TRAJECTORY LOGGING (for debugging and analysis)
# =============================================================================

trajectory_log:
  enabled: true
  save_ratio: 0.1               # Save 10% of trajectories
  max_samples_per_step: 20      # Maximum samples per training step
  filename: trajectory_samples.jsonl

# =============================================================================
# REPLAY BUFFER - Standard PER + V-trace Configuration
# =============================================================================
# V-trace provides off-policy correction through:
#   - Truncated importance sampling ratios (rho)
#   - Trace coefficients (c) for value propagation
#
# This allows better utilization of replay buffer data while
# maintaining stability through truncation.
# =============================================================================

replay:
  enabled: true
  capacity: 50000
  min_size: ${rollout_batch_size}
  train_steps_per_env_step: 2
  use_rollout_batch_size: true
  sampling_mode: "step"               # Step level sampling
  storage_mode: tokens_only
  lazy_tokenization: false
  eviction_strategy: "fifo"

  # Standard PER: reward-based priority
  priority_function: "reward"
  priority_exponent: 0.6

  # Importance Sampling Correction (complementary to V-trace)
  importance_sampling_correction: false
  importance_beta: 0.4
