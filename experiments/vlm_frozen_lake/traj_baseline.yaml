# ==============================================================================
# VLM FROZENLAKE BASELINE - Trajectory Level (No Replay)
# ==============================================================================
# Purpose: VLM baseline experiment without replay buffer
# Hardware: 4x H100
#   - GPU 0-1: actor_train + reference (DeepSpeed ZeRO-2)
#   - GPU 2-3: actor_infer (vLLM)
# Model: Qwen2.5-VL-3B-Instruct
# EnvManager: VLTrajEnvManager (multimodal: image + text)
# ==============================================================================
defaults:
  - ../../ROLL/examples/config/traj_envs@_here_
  - ../../ROLL/examples/config/deepspeed_zero@_here_
  - ../../ROLL/examples/config/deepspeed_zero2@_here_
  - ../../ROLL/examples/config/deepspeed_zero2_cpuoffload@_here_
  - ../../ROLL/examples/config/deepspeed_zero3@_here_
  - ../../ROLL/examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "vlm_traj_baseline"
seed: 42
timestamp: ${oc.env:TRAINING_TIMESTAMP,${now:%Y%m%d_%H%M%S}}
base_output_dir: /mnt/project_modelware_roce/zhaojian/liangsirui/weiyu/projects/local_roll_dev/roll_dev/experiments/vlm_frozen_lake/output
logging_dir: ${base_output_dir}/${timestamp}/logs
output_dir: ${base_output_dir}/${timestamp}
render_save_dir: ${base_output_dir}/${timestamp}/render
system_envs:
  USE_MODELSCOPE: '1'

track_with: wandb
tracker_kwargs:
  project: roll-vlm-frozen-lake
  name: ${timestamp}_${exp_name}
  notes: "VLM Baseline: Trajectory level, no replay buffer, RGB image state, 4xH100"
  tags: [agentic, roll, frozen_lake, vlm, baseline, trajectory, 4xH100]
  mode: offline
  dir: ${base_output_dir}/${timestamp}/wandb

checkpoint_config:
  type: file_system
  output_dir: ${base_output_dir}/${timestamp}/models/${exp_name}

# =============================================================================
# TRAINING CONFIGURATION
# =============================================================================

num_gpus_per_node: 4

max_steps: 100
save_steps: 10000
logging_steps: 1
eval_steps: 10
resume_from_checkpoint: false

train_from_replay_only: false
batch_adjust_mode: auto
async_generation_ratio: 1

rollout_batch_size: 128
val_batch_size: 128
sequence_length: 4096

advantage_clip: 20
ppo_epochs: 1
adv_estimator: "reinforce"
init_kl_coef: 0.1
use_kl_loss: true
kl_loss_coef: 0.05
whiten_advantages: true
entropy_loss_coef: 0.01
max_grad_norm: 1.0

# =============================================================================
# MODEL CONFIGURATION - VLM
# =============================================================================

pretrain: /mnt/project_modelware_roce/zhaojian/models/pretrain/Qwen2.5-VL-3B-Instruct
reward_pretrain: ${pretrain}

actor_train:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 32
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero2}
  device_mapping: list(range(0,2))
  infer_batch_size: 1
  # Dynamic batching: group similar-length sequences to reduce padding
  use_dynamic_batching_in_train: true
  max_tokens_per_microbatch_in_train: 16384  # sequence_length(4096) * 2 * micro_batch_size(2)
  sequence_length_round_in_train: 4
  use_dynamic_batching_in_infer: true
  max_tokens_per_microbatch_in_infer: 16384
  sequence_length_round_in_infer: 4

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: 128
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.85
      block_size: 16
      load_format: auto
      limit_mm_per_prompt:
        image: ${max_actions_per_traj}
  device_mapping: list(range(2,4))

reference:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: list(range(0,2))
  infer_batch_size: 1
  # Dynamic batching for reference inference
  use_dynamic_batching_in_infer: true
  max_tokens_per_microbatch_in_infer: 16384
  sequence_length_round_in_infer: 4

# =============================================================================
# ENVIRONMENT CONFIGURATION - VLM FrozenLake
# =============================================================================

action_pattern: <answer>(.*?)</answer>
think_action_pattern: <think>(.*?)</think>\s*<answer>(.*?)</answer>
user_prompt_no_think_format: <answer> [your answer] </answer>
user_prompt_think_format: <think> [Your thoughts] </think> <answer> [your answer] </answer>

max_tokens_per_step: 128
max_actions_per_traj: 10

reward_normalization:
  grouping: traj_group_id
  method: mean_std

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 16
  num_env_groups: 32
  group_size: 4
  tags: [FrozenLake]
  num_groups_partition: [32]
  max_traj_per_env: 2

val_env_manager:
  max_env_num_per_worker: 32
  num_env_groups: 128
  group_size: 1
  tags: [FrozenLake]
  num_groups_partition: [128]

custom_envs:
  FrozenLake:
    env_type: frozen_lake
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_no_think_format}

    # VLM-specific: Use VLTrajEnvManager
    env_manager_cls: roll.pipeline.agentic.env_manager.vl_traj_env_manager.VLTrajEnvManager

    # VLM-specific templates (different from TrajEnvManager)
    agent_system_template: |
      You are an agent solving the FrozenLake puzzle by viewing images.
      The image shows a grid where:
      - P (blue): Your current position
      - G (green): Goal - reach this!
      - O (red): Holes - avoid these!
      - _ (white): Safe frozen tiles
      Output your action as: <answer>Action</answer>
      Available actions: Left, Down, Right, Up

    # VLTrajEnvManager uses different template variables
    pre_step_template: "Turn {turn_idx}:\nObserve the current state:"
    next_step_template: |
      You have {actions_left} actions left.
      Analyze the image and decide your next move.
      Respond within {max_response_length} tokens.
    reward_template: "Previous action reward: {reward}\n"

    use_thread_lock: true

    env_config:
      env_instruction: |
        You are solving the FrozenLake puzzle by looking at images.
        Navigate from your position (P) to the goal (G) while avoiding holes (O).
        The ice may be slippery!
        Format your answer as: <answer>Right</answer>
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      is_slippery: false
      render_mode: "rgb_array"

# =============================================================================
# TRAJECTORY LOGGING
# =============================================================================

trajectory_log:
  enabled: true
  save_ratio: 0.1
  max_samples_per_step: 20
  filename: trajectory_samples.jsonl

# =============================================================================
# OFF-POLICY MONITORING
# =============================================================================

offpolicy_monitor:
  enabled: true
  save_behavior_log_probs: true
  monitor_fresh_batch: true
  monitor_replay_batch: false
  monitor_interval: 1

# =============================================================================
# REPLAY BUFFER (DISABLED for baseline)
# =============================================================================

replay:
  enabled: false
