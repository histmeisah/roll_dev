# ==============================================================================
# NQ SEARCH TRAINING - Step Replay Buffer + N-Step + Age-Advantage Priority
# ==============================================================================
defaults:
  - ../../ROLL/examples/config/step_envs@_here_
  - ../../ROLL/examples/config/deepspeed_zero@_here_
  - ../../ROLL/examples/config/deepspeed_zero2@_here_
  - ../../ROLL/examples/config/deepspeed_zero3@_here_
  - ../../ROLL/examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "nq_search_steprb_nstep_age_advantage"
seed: 42
timestamp: ${oc.env:TRAINING_TIMESTAMP,${now:%Y%m%d_%H%M%S}}
base_output_dir: /mnt/scimaster/shuotang/weiyu/roll_dev/experiments/nq_search_replay/output
logging_dir: ${base_output_dir}/${timestamp}/logs
output_dir: ${base_output_dir}/${timestamp}
render_save_dir: ${base_output_dir}/${timestamp}/render
system_envs:
  USE_MODELSCOPE: '1'

track_with: wandb
tracker_kwargs:
  project: roll-agentic-nq-search
  name: ${timestamp}_steprb_nstep_age_advantage_priority
  notes: "NQ Search: Step ReplayBuffer + N-Step + Age-Advantage Priority"
  tags: [agentic, roll, nq_search, replay, step_rb, nstep, age_advantage_priority, retrieval_qa]
  mode: offline
  dir: ${base_output_dir}/${timestamp}/wandb

checkpoint_config:
  type: file_system
  output_dir: ${base_output_dir}/${timestamp}/models/${exp_name}

# =============================================================================
# TRAINING CONFIGURATION
# =============================================================================

num_gpus_per_node: 8

max_steps: 300
save_steps: 10000
logging_steps: 1
eval_steps: 5
resume_from_checkpoint: false

train_from_replay_only: false
batch_adjust_mode: auto
async_generation_ratio: 1

# Batch and sequence settings (H200保守配置，避免OOM)
rollout_batch_size: 128  # 保守配置
val_batch_size: 128
sequence_length: 12800    # 降低序列长度以节省显存

# RL algorithm settings
advantage_clip: 20
ppo_epochs: 1
adv_estimator: "gae"  # Use GAE for step-level (inner layer)
gamma: 0.995  # Token-level gamma (inner layer)
lambd: 0.95
init_kl_coef: 0.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================

pretrain: /mnt/scimaster/model/Qwen2.5-7B-Instruct/qwen2.5-7b-instruct
reward_pretrain: /mnt/scimaster/model/Qwen2.5-7B-Instruct/qwen2.5-7b-instruct

actor_train:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 1   # 全局有效batch size = per_device × gradient_accumulation × num_gpus
    gradient_accumulation_steps: 16
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero3}  # Use Zero-3 for better memory efficiency (single-node 8 GPUs, NVLink bandwidth is sufficient)
  device_mapping: list(range(0,4))
  infer_batch_size: 1

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${max_tokens_per_step} # single-turn response length
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
    stop_strings: ["</search>", "</answer>"]
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.8
      block_size: 16
      load_format: auto
  device_mapping: list(range(4,8))

reference:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: list(range(4,8))  # Changed: Move to GPU 4-7 (same as actor_infer) to avoid GPU 0 OOM
  infer_batch_size: 1

critic:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: trl  # Use AutoModelForCausalLMWithValueHead from TRL
  training_args:
    learning_rate: 1.0e-5
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero3}  # Use Zero-3 for better memory efficiency (single-node 8 GPUs, NVLink bandwidth is sufficient)
  device_mapping: list(range(4,8))  # Changed: Move to GPU 4-7 to avoid GPU 0 OOM
  infer_batch_size: 1

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================

# NQ Search 使用 <think>, <search>, <answer> 三个标签
action_pattern: (<think>.*?</think>.*?(<search>.*?</search>|<answer>.*?</answer>))
think_action_pattern: <think>(.*?)</think>\s*(?:<search>(.*?)</search>|<answer>(.*?)</answer>)
user_prompt_format: |
  <think> [Your reasoning] </think>
  <search> [search query] </search> (if you need more information)
  OR
  <answer> [your final answer] </answer> (if you are ready to answer)

max_tokens_per_step: 4096
max_actions_per_traj: 5

reward_normalization:
  grouping: batch
  method: identity

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 16
  num_env_groups: 64          # 减少环境组数，总计64×4=256个环境
  group_size: 4               # 减少每组大小
  tags: [NQSearch]
  num_groups_partition: [64]  # 必须等于 num_env_groups

val_env_manager:
  max_env_num_per_worker: 16  # 大幅降低验证环境数量
  num_env_groups: 32          # 从128降到32，总计32个验证环境
  group_size: 1
  tags: [NQSearchVal]         # 使用独立的验证环境
  num_groups_partition: [32]  # 必须等于 num_env_groups

custom_envs:
  NQSearch:
    env_type: nq_search
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_format}
    # StepEnvManager uses 'observation' instead of 'state'
    agent_system_template: ""  # 空字符串，避免null导致问题
    agent_template: |
      ## Env Instruction: {env_instruction}

      ## State Description:
      Prior to this step, you have completed {step_count} steps.
      Recent History: Below are the most recent {history_length} observations, the corresponding actions you took, and the environmental reward feedback:
      [{history}]

      Current State:
      You are currently at step {current_step}. Your current observation is: [{current_observation}]

      ## Output Format Requirement:
      Your response *must* strictly adhere to the following format:
      <think> [Your reasoning] </think>
      <search> [search query] </search> (if you need more information)
      OR
      <answer> [your final answer] </answer> (if you are ready to answer)

      Response Length Limit: Your output must not exceed {max_response_length} tokens.

      Determine the Next Action:
    reward_template: "Feedback: Your previous action received reward {reward}. Revise your plan if needed."
    env_manager_cls: roll.pipeline.agentic.env_manager.step_env_manager.StepEnvManager  # Step-level
    use_thread_lock: true
    env_config:
      # 数据集配置
      dataset_path: /mnt/scimaster/shuotang/weiyu/roll_dev/data/nq_search_converted/train_converted.parquet
      max_instances: 2000  # H200显存充足，增加训练样本数

      # 检索服务器配置
      retrieval_server_url: http://127.0.0.1:8000/retrieve
      retrieval_timeout: 30
      retrieval_topk: 3
      return_scores: true

      # 限流配置
      max_concurrent_calls: 100 # H200显存充足，提升并发检索能力
      limiter_tag: nq_search_env
      disable_limiter: false

      # 环境设置
      env_instruction: "You are answering questions using web search. Use <think> to reason, <search> to retrieve information, and <answer> to provide your final answer. The answer format must be one of: <think>...</think><search>...</search> OR <think>...</think><answer>...</answer>"
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      max_search_calls: 5

      # 动作解析模式
      think_pattern: <think>(.*?)</think>
      search_pattern: <search>(.*?)</search>
      answer_pattern: <answer>(.*?)</answer>

      # 奖励设置
      use_outcome_reward_only: false  # Step-level needs step rewards
      correct_answer_reward: 1.0
      step_penalty: -0.01  # Small penalty per step to encourage efficiency
      invalid_action_penalty: -0.1

      # EM评估配置
      use_em_evaluation: true
      em_ignore_case: true
      em_ignore_punctuation: true
      em_ignore_articles: true

      # 特殊标记
      special_token_list: ["<think>", "</think>", "<search>", "</search>", "<answer>", "</answer>", "<information>", "</information>"]

  # 验证环境配置（使用测试集）
  NQSearchVal:
    env_type: nq_search
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_format}
    # StepEnvManager uses 'observation' instead of 'state'
    agent_system_template: ""  # 空字符串，避免null导致问题
    agent_template: |
      ## Env Instruction: {env_instruction}

      ## State Description:
      Prior to this step, you have completed {step_count} steps.
      Recent History: Below are the most recent {history_length} observations, the corresponding actions you took, and the environmental reward feedback:
      [{history}]

      Current State:
      You are currently at step {current_step}. Your current observation is: [{current_observation}]

      ## Output Format Requirement:
      Your response *must* strictly adhere to the following format:
      <think> [Your reasoning] </think>
      <search> [search query] </search> (if you need more information)
      OR
      <answer> [your final answer] </answer> (if you are ready to answer)

      Response Length Limit: Your output must not exceed {max_response_length} tokens.

      Determine the Next Action:
    reward_template: "Feedback: Your previous action received reward {reward}. Revise your plan if needed."
    env_manager_cls: roll.pipeline.agentic.env_manager.step_env_manager.StepEnvManager  # Step-level
    use_thread_lock: true
    env_config:
      # 数据集配置 - 使用测试集
      dataset_path: /mnt/scimaster/shuotang/weiyu/roll_dev/data/nq_search_converted/test_converted.parquet
      max_instances: 1000  # H200显存充足，增加验证样本数

      # 检索服务器配置
      retrieval_server_url: http://127.0.0.1:8000/retrieve
      retrieval_timeout: 30
      retrieval_topk: 3
      return_scores: true

      # 限流配置
      max_concurrent_calls: 100 # H200显存充足，提升验证并发能力
      limiter_tag: nq_search_val_env
      disable_limiter: false

      # 环境设置
      env_instruction: "You are answering questions using web search. Use <think> to reason, <search> to retrieve information, and <answer> to provide your final answer. The answer format must be one of: <think>...</think><search>...</search> OR <think>...</think><answer>...</answer>"
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      max_search_calls: 5

      # 动作解析模式
      think_pattern: <think>(.*?)</think>
      search_pattern: <search>(.*?)</search>
      answer_pattern: <answer>(.*?)</answer>

      # 奖励设置
      use_outcome_reward_only: false  # Step-level needs step rewards
      correct_answer_reward: 1.0
      step_penalty: -0.01
      invalid_action_penalty: -0.1

      # EM评估配置
      use_em_evaluation: true
      em_ignore_case: true
      em_ignore_punctuation: true
      em_ignore_articles: true

      # 特殊标记
      special_token_list: ["<think>", "</think>", "<search>", "</search>", "<answer>", "</answer>", "<information>", "</information>"]

# =============================================================================
# OFF-POLICY MONITORING CONFIGURATION
# =============================================================================

offpolicy_monitor:
  enabled: true
  save_behavior_log_probs: true
  monitor_fresh_batch: true
  monitor_replay_batch: true
  monitor_interval: 1

# =============================================================================
# STEP REPLAY BUFFER + N-STEP + AGE-ADVANTAGE PRIORITY + OFF-POLICY FILTER
# =============================================================================

replay:
  enabled: true
  capacity: 1000000  # Max steps in buffer (larger for step-level)
  min_size: ${rollout_batch_size}
  train_steps_per_env_step: 2  # Train 2 times per rollout (50% replay ratio)
  use_rollout_batch_size: true
  sampling_mode: "step"  # Step-level sampling
  storage_mode: tokens_only
  lazy_tokenization: false

  # Eviction Strategy: how to remove samples when buffer is full
  eviction_strategy: "fifo"  # FIFO is mainstream (OpenAI Baselines, Stable-Baselines3, RLlib)

  # N-Step Returns (Outer Layer)
  # Two-layer temporal abstraction: n-step (outer) + GAE (inner)
  enable_nstep: true
  n_step: 3  # Look ahead 3 steps (smaller than FrozenLake due to longer NQ episodes)
  nstep_gamma: 0.99  # Step-level gamma (outer layer)
  use_nstep_in_advantage: true  # Use n-step returns in advantage computation
  use_bootstrap: false

  # Age-Based Freshness Weighting
  # Decay formula: effective_priority = intrinsic_priority × exp(-age / age_decay)
  # Step-level buffer with 1M capacity needs larger age_decay
  age_decay: 2000.0  # For complex reasoning tasks with large buffer

  # Priority Function Configuration (flat structure)
  priority_function: "reward"
  priority_exponent: 0.6
  importance_sampling_correction: true
  importance_beta: 0.4

  # =========================================================================
  # OFF-POLICY FILTER CONFIGURATION (New Feature)
  # =========================================================================
  enable_offpolicy_filter: false  # DISABLED: StepEnvManager + filter causes validation deadlock
  ratio_clip_max: 3.0  # Maximum importance sampling ratio threshold
  filter_mini_batch_size: 32  # Mini-batch size for filtering (reduces GPU memory, also the minimum size)
  filter_max_attempts: 20  # Maximum mini-batches to try before fallback
  filter_min_acceptable_batch: 64  # Min samples needed, otherwise supplement with unfiltered

  # Adaptive Mini-Batch Configuration (自适应mini_batch_size)
  filter_adaptive_mini_batch: true  # 启用自适应mini_batch_size调整
  filter_success_rate_window: 5  # 滑动窗口大小：记录最近5次成功率，平滑调整
  # 自适应策略：
  # - 成功率≥95%: 直接设为target_batch_size (一次采样成功)
  # - 成功率≥90%: 翻倍增长 (例如 32→64→128)
  # - 成功率≥70%: 增长1.5倍 (例如 32→48→72)
  # - 成功率<70%: 回退到filter_mini_batch_size (32)

  # Filtering flow:
  # 1. Sample mini-batches (32 samples each, adaptive increase) and filter
  # 2. Early stop when collected enough valid samples (128)
  # 3. If < 64 valid samples, supplement with unfiltered samples
  # 4. If 0 valid samples after max_attempts, fallback to unfiltered batch
