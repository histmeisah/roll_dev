# ==============================================================================
# FROZENLAKE TRAINING - V-trace with Replay Buffer
# ==============================================================================
# This configuration demonstrates how to use V-trace for off-policy correction
# in combination with a replay buffer for improved sample efficiency.

defaults:
  - ../../ROLL/examples/config/traj_envs@_here_
  - ../../ROLL/examples/config/deepspeed_zero@_here_
  - ../../ROLL/examples/config/deepspeed_zero2@_here_
  - ../../ROLL/examples/config/deepspeed_zero3@_here_
  - ../../ROLL/examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "frozen_lake_vtrace_replay"
seed: 42
timestamp: ${oc.env:TRAINING_TIMESTAMP,${now:%Y%m%d_%H%M%S}}
base_output_dir: /data1/Chengyang_project/roll_dev/experiments/reproduce_frozen_lake_replay/output
logging_dir: ${base_output_dir}/${timestamp}/logs
output_dir: ${base_output_dir}/${timestamp}
render_save_dir: ${base_output_dir}/${timestamp}/render
system_envs:
  USE_MODELSCOPE: '1'

track_with: wandb
tracker_kwargs:
  project: roll-agentic-vtrace
  name: ${timestamp}_vtrace_replay
  notes: "FrozenLake: V-trace with Replay Buffer for off-policy correction"
  tags: [agentic, roll, frozen_lake, vtrace, replay, off_policy]
  mode: offline
  dir: ${base_output_dir}/${timestamp}/wandb

checkpoint_config:
  type: file_system
  output_dir: ${base_output_dir}/${timestamp}/models/${exp_name}

# =============================================================================
# TRAINING CONFIGURATION
# =============================================================================

num_gpus_per_node: 8

max_steps: 100
save_steps: 10000
logging_steps: 1
eval_steps: 5
resume_from_checkpoint: false

train_from_replay_only: false
batch_adjust_mode: auto
async_generation_ratio: 1

# Batch and sequence settings
rollout_batch_size: 128
val_batch_size: 128
sequence_length: 4096

# RL algorithm settings - Using V-trace
adv_estimator: "vtrace"  # 🔑 Using V-trace instead of GAE/reinforce
advantage_clip: 0.2
ppo_epochs: 1
init_kl_coef: 0.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0
gamma: 0.99  # Discount factor used by V-trace

# =============================================================================
# V-TRACE CONFIGURATION (NEW)
# =============================================================================
vtrace:
  rho_bar: 1.0  # Truncation for importance sampling ratio (ρ)
                # 1.0 = conservative (truncate to [0,1])
                # Higher values allow more off-policy correction
  c_bar: 1.0    # Truncation for trace coefficient (c)
                # 1.0 = conservative
                # Controls speed of value function propagation

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================

pretrain: /data1/Chengyang_project/Models/downloaded_models/Qwen2.5-0.5B-Instruct
reward_pretrain: /data1/Chengyang_project/Models/downloaded_models/Qwen2.5-0.5B-Instruct

actor_train:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 16
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero3}
  device_mapping: list(range(0,4))
  infer_batch_size: 2

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: 128
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.4
      block_size: 16
      load_format: auto
  device_mapping: list(range(6,8))

reference:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: list(range(4,6))
  infer_batch_size: 2

critic:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: trl
  training_args:
    learning_rate: 1.0e-5
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero2}
  device_mapping: list(range(4,8))
  infer_batch_size: 1

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================

action_pattern: <answer>(.*?)</answer>
think_action_pattern: <think>(.*?)</think>\s*<answer>(.*?)</answer>
user_prompt_no_think_format: <answer> [your answer] </answer>
user_prompt_think_format: <think> [Your thoughts] </think> <answer> [your answer] </answer>

max_tokens_per_step: 128
max_actions_per_traj: 10

reward_normalization:
  grouping: traj_group_id
  method: mean_std

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 16
  num_env_groups: 128
  group_size: 8
  tags: [FrozenLake]
  num_groups_partition: [128]

val_env_manager:
  max_env_num_per_worker: 32
  num_env_groups: 1024
  group_size: 1
  tags: [FrozenLake]
  num_groups_partition: [1024]

custom_envs:
  FrozenLake:
    env_type: frozen_lake
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_no_think_format}
    agent_system_template: "You are an agent solving the FrozenLake puzzle. Output must be wrapped as <answer>Action</answer>."
    agent_template: |
      Current turn: {turn_idx}
      Grid state:
      {state}
      Actions left: {actions_left}
      Respond with one action token only, within {max_response_length} tokens.
    reward_template: "Feedback: Your previous action received reward {reward}. Revise your plan if needed."
    env_manager_cls: roll.pipeline.agentic.env_manager.traj_env_manager.TrajEnvManager
    use_thread_lock: true
    env_config:
      env_instruction: "You are solving the FrozenLake puzzle. Avoid the holes and go to the target. You may move to the unintended direction due to the slippery ice. The answer must be one of action in a turn, format is <answer>Right</answer>"
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      is_slippery: false

# =============================================================================
# OFF-POLICY MONITORING CONFIGURATION
# =============================================================================
# Critical for V-trace: tracks importance sampling ratios and policy divergence

offpolicy_monitor:
  enabled: true
  save_behavior_log_probs: true  # Required for V-trace
  monitor_fresh_batch: true
  monitor_replay_batch: true
  monitor_interval: 1

# =============================================================================
# REPLAY BUFFER CONFIGURATION
# =============================================================================
# V-trace is designed for off-policy learning, making replay buffer ideal

replay:
  enabled: true
  capacity: 10000  # Max trajectories in buffer
  min_size: ${rollout_batch_size}
  train_steps_per_env_step: 2  # Train 2 times per rollout
  use_rollout_batch_size: true
  sampling_mode: "trajectory"  # Trajectory-level sampling for V-trace
  storage_mode: tokens_only
  lazy_tokenization: false

  # Eviction Strategy
  eviction_strategy: "fifo"  # FIFO is mainstream

  # N-Step Returns (not needed for V-trace, it has its own TD computation)
  enable_nstep: false
  n_step: 5
  nstep_gamma: 0.99
  use_nstep_in_advantage: false
  use_bootstrap: false

  # Age-Based Freshness Weighting
  age_decay: 500.0  # Smaller for FrozenLake

  # Priority Function Configuration (flat structure)
  priority_function: "reward"
  priority_exponent: 0.6
  importance_sampling_correction: true
  importance_beta: 0.4

# =============================================================================
# V-trace Specific Notes
# =============================================================================
# V-trace advantages over GAE for this setup:
# 1. Better off-policy correction with replay buffer
# 2. Truncated importance sampling prevents variance explosion
# 3. Suitable for distributed/async training
# 4. Theoretically grounded convergence guarantees
#
# Tips for tuning:
# - rho_bar=1.0: Conservative, stable but may underutilize off-policy data
# - rho_bar=2.0-5.0: More aggressive, better sample efficiency but less stable
# - c_bar usually kept at 1.0 for stability
# - Monitor "vtrace/avg_rho" and "vtrace/clipped_ratio" metrics
# - If too many samples are clipped, consider increasing rho_bar
# - If training is unstable, reduce rho_bar