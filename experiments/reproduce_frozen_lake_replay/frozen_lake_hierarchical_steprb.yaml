# ==============================================================================
# FROZENLAKE TRAINING - Hierarchical RL + Step Replay Buffer
# ==============================================================================
# This configuration tests Hierarchical RL with:
# - Step-level (upper): Processes environment rewards with GAE
# - Token-level (lower): Receives intrinsic rewards from step-level
# - Step Replay Buffer for off-policy training
# ==============================================================================
defaults:
  - ../../ROLL/examples/config/step_envs@_here_
  - ../../ROLL/examples/config/deepspeed_zero@_here_
  - ../../ROLL/examples/config/deepspeed_zero2@_here_
  - ../../ROLL/examples/config/deepspeed_zero3@_here_
  - ../../ROLL/examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "frozen_lake_hierarchical_steprb"
seed: 42
timestamp: ${oc.env:TRAINING_TIMESTAMP,${now:%Y%m%d_%H%M%S}}
base_output_dir: /data1/Chengyang_project/roll_dev/experiments/reproduce_frozen_lake_replay/output
logging_dir: ${base_output_dir}/${timestamp}/logs
output_dir: ${base_output_dir}/${timestamp}
render_save_dir: ${base_output_dir}/${timestamp}/render
system_envs:
  USE_MODELSCOPE: '1'

track_with: wandb
tracker_kwargs:
  project: roll-agentic-hierarchical
  name: ${timestamp}_frozen_lake_hierarchical_steprb
  notes: "FrozenLake: Hierarchical RL + Step ReplayBuffer"
  tags: [agentic, roll, frozen_lake, hierarchical_rl, step_rb, replay]
  mode: offline
  dir: ${base_output_dir}/${timestamp}/wandb

checkpoint_config:
  type: file_system
  output_dir: ${base_output_dir}/${timestamp}/models/${exp_name}

# =============================================================================
# TRAINING CONFIGURATION
# =============================================================================

num_gpus_per_node: 8

max_steps: 100
save_steps: 10000
logging_steps: 1
eval_steps: 5
resume_from_checkpoint: false

train_from_replay_only: false
batch_adjust_mode: auto
async_generation_ratio: 1

# Batch and sequence settings
rollout_batch_size: 128
val_batch_size: 128
sequence_length: 4096

# RL algorithm settings
advantage_clip: 0.2
ppo_epochs: 1
adv_estimator: "gae"  # Will be overridden by hierarchical RL
gamma: 0.995  # Will be used by token-level
lambd: 0.95   # Will be used by token-level
init_kl_coef: 0.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================

pretrain: /data1/Chengyang_project/Models/downloaded_models/Qwen2.5-0.5B-Instruct
reward_pretrain: /data1/Chengyang_project/Models/downloaded_models/Qwen2.5-0.5B-Instruct

actor_train:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero2}
  device_mapping: list(range(0,4))
  infer_batch_size: 1

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: 128
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.8
      block_size: 16
      load_format: auto
  device_mapping: list(range(4,8))

reference:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: list(range(0,4))
  infer_batch_size: 1

critic:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: trl
  training_args:
    learning_rate: 1.0e-5
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero2}
  device_mapping: list(range(4,8))
  infer_batch_size: 1

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================

action_pattern: <answer>(.*?)</answer>
think_action_pattern: <think>(.*?)</think>\s*<answer>(.*?)</answer>
user_prompt_no_think_format: <answer> [your answer] </answer>
user_prompt_think_format: <think> [Your thoughts] </think> <answer> [your answer] </answer>

max_tokens_per_step: 128
max_actions_per_traj: 10

reward_normalization:
  grouping: traj_group_id
  method: mean_std

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 16
  num_env_groups: 128
  group_size: 8
  tags: [FrozenLake]
  num_groups_partition: [128]

val_env_manager:
  max_env_num_per_worker: 32
  num_env_groups: 1024
  group_size: 1
  tags: [FrozenLake]
  num_groups_partition: [1024]

custom_envs:
  FrozenLake:
    env_type: frozen_lake
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_no_think_format}
    agent_system_template: "You are an agent solving the FrozenLake puzzle. Output must be wrapped as <answer>Action</answer>."
    agent_template: |
      ## Env Instruction: {env_instruction}

      ## State Description:
      Prior to this step, you have completed {step_count} steps.
      Recent History: Below are the most recent {history_length} observations, the corresponding actions you took, and the environmental reward feedback:
      [{history}]

      Current State:
      You are currently at step {current_step}. Your current observation is: [{current_observation}]

      ## Output Format Requirement:
      Your response *must* strictly adhere to the following format: <answer> [your answer] </answer>, with no extra text.
      Response Length Limit: Your output must not exceed {max_response_length} words (tokens).

      Determine the Next Action:
    reward_template: "Feedback: Your previous action received reward {reward}. Revise your plan if needed."
    env_manager_cls: roll.pipeline.agentic.env_manager.step_env_manager.StepEnvManager  # Step-level required for hierarchical RL
    use_thread_lock: true
    env_config:
      env_instruction: "You are solving the FrozenLake puzzle. Forbid the whole and go to the target. You may move to the unintended direction due to the slippery ice. The answer must be one of action in a turn, format is <answer>Right</answer>"
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      is_slippery: false

# =============================================================================
# HIERARCHICAL RL CONFIGURATION
# =============================================================================
# Two-level hierarchy:
# 1. Step-level (upper): Processes environment rewards with GAE
# 2. Token-level (lower): Receives intrinsic rewards from step-level

hierarchical_rl:
  enabled: true  # Enable hierarchical RL

  # ========================================
  # Upper Level (Step-level)
  # ========================================
  step_level_estimator: gae  # Use GAE for step-level advantages
  step_gamma: 0.99  # Environment reward discount factor
  step_lambda: 0.95  # GAE lambda for step-level

  # How to extract step-level value from token values
  step_value_source: last_token  # Options: last_token, mean_tokens, max_tokens

  # ========================================
  # Lower Level (Token-level)
  # ========================================
  token_level_estimator: gae  # Use GAE for token-level advantages
  token_gamma: 0.995  # Token-level discount (within each step)
  token_lambda: 0.95  # GAE lambda for token-level

  # ========================================
  # Reward Assignment Strategy
  # ========================================
  # How to distribute step-level returns to tokens
  reward_assignment: last_token  # Options: last_token, uniform, exponential, value_weighted
  assignment_temperature: 1.0  # Temperature for value_weighted (if used)

  # ========================================
  # Mixing Options (for ablation studies)
  # ========================================
  use_original_rewards: false  # Don't mix with original token rewards
  mixing_alpha: 1.0  # 1.0 = fully hierarchical

  # ========================================
  # Logging
  # ========================================
  log_hierarchical_metrics: true  # Log detailed hierarchical metrics
  debug_mode: false  # Enable debug logging

# =============================================================================
# OFF-POLICY MONITORING CONFIGURATION
# =============================================================================

offpolicy_monitor:
  enabled: true
  save_behavior_log_probs: true
  monitor_fresh_batch: true
  monitor_replay_batch: true
  monitor_interval: 1

# =============================================================================
# STEP REPLAY BUFFER CONFIGURATION
# =============================================================================

replay:
  enabled: true
  capacity: 100000  # Max steps in buffer
  min_size: ${rollout_batch_size}
  train_steps_per_env_step: 2  # Train 2 times per rollout
  use_rollout_batch_size: true
  sampling_mode: "step"  # Step-level sampling
  storage_mode: tokens_only
  lazy_tokenization: false

  # Eviction Strategy
  eviction_strategy: "fifo"  # FIFO is mainstream

  # N-Step Returns (optional, can be disabled for hierarchical RL)
  enable_nstep: false  # Disable for pure hierarchical RL
  n_step: 5
  nstep_gamma: 0.99
  use_nstep_in_advantage: false
  use_bootstrap: false

  # Age-Based Freshness Weighting
  age_decay: 500.0  # Smaller for FrozenLake

  # Priority Function Configuration (flat structure)
  priority_function: "uniform"
  priority_exponent: 0.6
  importance_sampling_correction: true
  importance_beta: 0.4
