# 日志配置文件
version: 1
disable_existing_loggers: false

formatters:
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  simple:
    format: '%(levelname)s - %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout
    
  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: detailed
    filename: /data1/Weiyu_project/roll_dev/experiments/test_sync_train/output/logs/roll_debug.log
    mode: a
    
  rotating_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: /data1/Weiyu_project/roll_dev/experiments/test_sync_train/output/logs/roll_training.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    mode: a

loggers:
  roll:
    level: DEBUG
    handlers: [console, file, rotating_file]
    propagate: false
    
  ray:
    level: INFO
    handlers: [console, rotating_file]
    propagate: false

root:
  level: INFO
  handlers: [console, rotating_file] 