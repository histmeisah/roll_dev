# ==============================================================================
# NQ SEARCH TRAINING - Step-Level PPO Baseline (No Replay Buffer)
# ==============================================================================
# This config uses PPO with GAE for step-level training as the baseline
# for comparison with replay buffer experiments.
# - Algorithm: PPO with GAE (Generalized Advantage Estimation)
# - Replay Buffer: DISABLED (baseline)
# - Off-Policy Monitor: ENABLED (for metrics tracking)
# ==============================================================================

defaults:
  - ../../ROLL/examples/config/step_envs@_here_
  - ../../ROLL/examples/config/deepspeed_zero@_here_
  - ../../ROLL/examples/config/deepspeed_zero2@_here_
  - ../../ROLL/examples/config/deepspeed_zero3@_here_
  - ../../ROLL/examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "nq_search_step_ppo_baseline"
seed: 42
timestamp: ${oc.env:TRAINING_TIMESTAMP,${now:%Y%m%d_%H%M%S}}
base_output_dir: /mnt/scimaster/shuotang/weiyu/roll_dev/experiments/nq_search_replay/output
logging_dir: ${base_output_dir}/${timestamp}/logs
output_dir: ${base_output_dir}/${timestamp}
render_save_dir: ${base_output_dir}/${timestamp}/render
system_envs:
  USE_MODELSCOPE: '1'

track_with: wandb
tracker_kwargs:
  project: roll-agentic-nq-search
  name: ${timestamp}_step_ppo_baseline
  notes: "NQ Search PPO Baseline - Step-Level with GAE, No Replay Buffer"
  tags: [agentic, roll, nq_search, baseline, step_env, ppo, gae, no_replay, retrieval_qa]
  mode: offline
  dir: ${base_output_dir}/${timestamp}/wandb

checkpoint_config:
  type: file_system
  output_dir: ${base_output_dir}/${timestamp}/models/${exp_name}

# =============================================================================
# TRAINING CONFIGURATION
# =============================================================================

num_gpus_per_node: 8

max_steps: 300
save_steps: 10000
logging_steps: 1
eval_steps: 5
resume_from_checkpoint: false

train_from_replay_only: false
batch_adjust_mode: auto
async_generation_ratio: 1

# Batch and sequence settings
rollout_batch_size: 128
val_batch_size: 128
sequence_length: 12800

# RL algorithm settings - PPO with GAE
advantage_clip: 20
ppo_epochs: 1
adv_estimator: "gae"  # Use GAE for step-level advantage estimation
gamma: 0.995  # Token-level discount factor (inner layer)
lambd: 0.95   # GAE lambda parameter
init_kl_coef: 0.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================

pretrain: /mnt/scimaster/model/Qwen2.5-7B-Instruct/qwen2.5-7b-instruct
reward_pretrain: /mnt/scimaster/model/Qwen2.5-7B-Instruct/qwen2.5-7b-instruct

actor_train:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero3}
  device_mapping: list(range(0,4))
  infer_batch_size: 1

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${max_tokens_per_step}
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
    stop_strings: ["</search>", "</answer>"]
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.4
      block_size: 16
      load_format: auto
  device_mapping: list(range(4,8))

reference:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: list(range(4,8))
  infer_batch_size: 1

# Critic configuration for GAE
critic:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: trl  # Use AutoModelForCausalLMWithValueHead from TRL
  training_args:
    learning_rate: 1.0e-5
    weight_decay: 0
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero3}
  device_mapping: list(range(4,8))
  infer_batch_size: 1

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================

action_pattern: (<think>.*?</think>.*?(<search>.*?</search>|<answer>.*?</answer>))
think_action_pattern: <think>(.*?)</think>\s*(?:<search>(.*?)</search>|<answer>(.*?)</answer>)
user_prompt_format: |
  <think> [Your reasoning] </think>
  <search> [search query] </search> (if you need more information)
  OR
  <answer> [your final answer] </answer> (if you are ready to answer)

max_tokens_per_step: 4096
max_actions_per_traj: 5

reward_normalization:
  grouping: batch
  method: identity

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 16
  num_env_groups: 64
  group_size: 4
  tags: [NQSearch]
  num_groups_partition: [64]

val_env_manager:
  max_env_num_per_worker: 16
  num_env_groups: 32
  group_size: 1
  tags: [NQSearchVal]
  num_groups_partition: [32]

custom_envs:
  NQSearch:
    env_type: nq_search
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_format}
    agent_system_template: ""
    agent_template: |
      ## Env Instruction: {env_instruction}

      ## State Description:
      Prior to this step, you have completed {step_count} steps.
      Recent History: Below are the most recent {history_length} observations, the corresponding actions you took, and the environmental reward feedback:
      [{history}]

      Current State:
      You are currently at step {current_step}. Your current observation is: [{current_observation}]

      ## Output Format Requirement:
      Your response *must* strictly adhere to the following format:
      <think> [Your reasoning] </think>
      <search> [search query] </search> (if you need more information)
      OR
      <answer> [your final answer] </answer> (if you are ready to answer)

      Response Length Limit: Your output must not exceed {max_response_length} tokens.

      Determine the Next Action:
    reward_template: "Feedback: Your previous action received reward {reward}. Revise your plan if needed."
    env_manager_cls: roll.pipeline.agentic.env_manager.step_env_manager.StepEnvManager
    use_thread_lock: true
    env_config:
      # Dataset configuration
      dataset_path: /mnt/scimaster/shuotang/weiyu/roll_dev/data/nq_search_converted/train_converted.parquet
      max_instances: 2000

      # Retrieval server configuration
      retrieval_server_url: http://127.0.0.1:8000/retrieve
      retrieval_timeout: 30
      retrieval_topk: 3
      return_scores: true

      # Rate limiting configuration
      max_concurrent_calls: 100
      limiter_tag: nq_search_env
      disable_limiter: false

      # Environment settings
      env_instruction: "You are answering questions using web search. Use <think> to reason, <search> to retrieve information, and <answer> to provide your final answer. The answer format must be one of: <think>...</think><search>...</search> OR <think>...</think><answer>...</answer>"
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      max_search_calls: 5

      # Action parsing patterns
      think_pattern: <think>(.*?)</think>
      search_pattern: <search>(.*?)</search>
      answer_pattern: <answer>(.*?)</answer>

      # Reward settings
      use_outcome_reward_only: false  # Step-level needs step rewards for GAE
      correct_answer_reward: 1.0
      step_penalty: -0.01  # Small penalty per step to encourage efficiency
      invalid_action_penalty: -0.1

      # EM evaluation configuration
      use_em_evaluation: true
      em_ignore_case: true
      em_ignore_punctuation: true
      em_ignore_articles: true

      # Special tokens
      special_token_list: ["<think>", "</think>", "<search>", "</search>", "<answer>", "</answer>", "<information>", "</information>"]

  # Validation environment configuration
  NQSearchVal:
    env_type: nq_search
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_format}
    agent_system_template: ""
    agent_template: |
      ## Env Instruction: {env_instruction}

      ## State Description:
      Prior to this step, you have completed {step_count} steps.
      Recent History: Below are the most recent {history_length} observations, the corresponding actions you took, and the environmental reward feedback:
      [{history}]

      Current State:
      You are currently at step {current_step}. Your current observation is: [{current_observation}]

      ## Output Format Requirement:
      Your response *must* strictly adhere to the following format:
      <think> [Your reasoning] </think>
      <search> [search query] </search> (if you need more information)
      OR
      <answer> [your final answer] </answer> (if you are ready to answer)

      Response Length Limit: Your output must not exceed {max_response_length} tokens.

      Determine the Next Action:
    reward_template: "Feedback: Your previous action received reward {reward}. Revise your plan if needed."
    env_manager_cls: roll.pipeline.agentic.env_manager.step_env_manager.StepEnvManager
    use_thread_lock: true
    env_config:
      # Dataset configuration - use test set
      dataset_path: /mnt/scimaster/shuotang/weiyu/roll_dev/data/nq_search_converted/test_converted.parquet
      max_instances: 1000

      # Retrieval server configuration
      retrieval_server_url: http://127.0.0.1:8000/retrieve
      retrieval_timeout: 30
      retrieval_topk: 3
      return_scores: true

      # Rate limiting configuration
      max_concurrent_calls: 100
      limiter_tag: nq_search_val_env
      disable_limiter: false

      # Environment settings
      env_instruction: "You are answering questions using web search. Use <think> to reason, <search> to retrieve information, and <answer> to provide your final answer. The answer format must be one of: <think>...</think><search>...</search> OR <think>...</think><answer>...</answer>"
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      max_search_calls: 5

      # Action parsing patterns
      think_pattern: <think>(.*?)</think>
      search_pattern: <search>(.*?)</search>
      answer_pattern: <answer>(.*?)</answer>

      # Reward settings
      use_outcome_reward_only: false  # Step-level needs step rewards for GAE
      correct_answer_reward: 1.0
      step_penalty: -0.01
      invalid_action_penalty: -0.1

      # EM evaluation configuration
      use_em_evaluation: true
      em_ignore_case: true
      em_ignore_punctuation: true
      em_ignore_articles: true

      # Special tokens
      special_token_list: ["<think>", "</think>", "<search>", "</search>", "<answer>", "</answer>", "<information>", "</information>"]

# =============================================================================
# OFF-POLICY MONITORING CONFIGURATION
# =============================================================================
# Enable monitor to track policy divergence even without replay buffer
# This provides valuable metrics for baseline comparison

offpolicy_monitor:
  enabled: true  # ENABLED: Track behavior for baseline comparison
  save_behavior_log_probs: false  # FALSE: No need to pre-compute for replay buffer (baseline has no replay)
  monitor_fresh_batch: true  # TRUE: Monitor using log_probs computed during training (no extra cost)
  monitor_replay_batch: false  # No replay batches in baseline
  monitor_interval: 1  # Monitor every step

# =============================================================================
# REPLAY BUFFER CONFIGURATION - DISABLED FOR BASELINE
# =============================================================================
# Replay buffer is disabled to establish baseline performance
# This configuration serves as the control group for replay buffer experiments

replay:
  enabled: false  # DISABLED: This is the baseline without replay buffer
