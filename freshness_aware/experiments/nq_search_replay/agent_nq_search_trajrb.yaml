# ==============================================================================
# NQ SEARCH TRAINING - Trajectory Replay Buffer + old_prob(trajectory + trainer)
# ==============================================================================
defaults:
  - ../../ROLL/examples/config/traj_envs@_here_
  - ../../ROLL/examples/config/deepspeed_zero@_here_
  - ../../ROLL/examples/config/deepspeed_zero2@_here_
  - ../../ROLL/examples/config/deepspeed_zero3@_here_
  - ../../ROLL/examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "nq_search_agentic"
seed: 42
timestamp: ${oc.env:TRAINING_TIMESTAMP,${now:%Y%m%d_%H%M%S}}
base_output_dir: /mnt/scimaster/shuotang/weiyu/roll_dev/experiments/nq_search_replay/output
logging_dir: ${base_output_dir}/${timestamp}/logs
output_dir: ${base_output_dir}/${timestamp}
render_save_dir: ${base_output_dir}/${timestamp}/render
system_envs:
  USE_MODELSCOPE: '1'

track_with: wandb
tracker_kwargs:
  project: roll-agentic-nq-search
  name: ${timestamp}_standard_PER_constant_lr
  notes: "NQ Search with Standard PER (advantage priority, IS correction) + Constant LR"
  tags: [agentic, roll, nq_search, per, priority_replay, constant_lr]
  mode: offline
  dir: ${base_output_dir}/${timestamp}/wandb

checkpoint_config:
  type: file_system
  output_dir: ${base_output_dir}/${timestamp}/models/${exp_name}

# =============================================================================
# TRAINING CONFIGURATION
# =============================================================================

num_gpus_per_node: 8

max_steps: 300
save_steps: 10000
logging_steps: 1
eval_steps: 5
resume_from_checkpoint: false

train_from_replay_only: false
batch_adjust_mode: auto
async_generation_ratio: 1

# Batch and sequence settings (H200保守配置，避免OOM)
rollout_batch_size: 128  # 保守配置
val_batch_size: 128      
sequence_length: 12800    # 降低序列长度以节省显存

# RL algorithm settings
advantage_clip: 20
ppo_epochs: 1
adv_estimator: "reinforce"
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

# KL Divergence Constraint
use_kl_loss: true
kl_loss_coef: 0.001

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================

pretrain: /mnt/scimaster/model/Qwen2.5-7B-Instruct/qwen2.5-7b-instruct
reward_pretrain: /mnt/scimaster/model/Qwen2.5-7B-Instruct/qwen2.5-7b-instruct

actor_train:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 1   # 全局有效batch size (Global Effective Batch Size) = per_device_train_batch_size × gradient_accumulation_steps × num_gpus
    gradient_accumulation_steps: 16   #
    warmup_steps: 0
    lr_scheduler_type: constant  # 恒定学习率，适合 off-policy 训练
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero3}
  device_mapping: list(range(0,4))
  infer_batch_size: 1

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${max_tokens_per_step} # single-turn response length
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
    stop_strings: ["</search>", "</answer>"]
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.8  # 适度提升，避免过度占用
      block_size: 16
      load_format: auto
  device_mapping: list(range(4,8))

reference:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: list(range(0,4))
  infer_batch_size: 1  # Reference模型保守配置，避免计算log_probs时OOM

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================

# NQ Search 使用 <think>, <search>, <answer> 三个标签
action_pattern: (<think>.*?</think>.*?(<search>.*?</search>|<answer>.*?</answer>))
think_action_pattern: <think>(.*?)</think>\s*(?:<search>(.*?)</search>|<answer>(.*?)</answer>)
user_prompt_format: |
  <think> [Your reasoning] </think> 
  <search> [search query] </search> (if you need more information)
  OR
  <answer> [your final answer] </answer> (if you are ready to answer)

max_tokens_per_step: 4096 
max_actions_per_traj: 5

reward_normalization:
  grouping: batch
  method: identity

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 16  
  num_env_groups: 64          # 减少环境组数，总计64×4=256个环境
  group_size: 4               # 减少每组大小
  tags: [NQSearch]
  num_groups_partition: [64]  # 必须等于 num_env_groups

val_env_manager:
  max_env_num_per_worker: 16  # 大幅降低验证环境数量
  num_env_groups: 32          # 从128降到32，总计32个验证环境
  group_size: 1
  tags: [NQSearchVal]         # 使用独立的验证环境
  num_groups_partition: [32]  # 必须等于 num_env_groups

custom_envs:
  NQSearch:
    env_type: nq_search
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_format}
    # 移除所有template，直接使用环境返回的observation（包含NQ问题）
    agent_system_template: ""  # 空字符串，避免null导致问题
    agent_template: "{state}"  # TrajEnvManager使用'state'而不是'observation'
    reward_template: ""  # 空字符串，不添加额外的reward反馈
    env_manager_cls: roll.pipeline.agentic.env_manager.traj_env_manager.TrajEnvManager
    use_thread_lock: true
    env_config:
      # 数据集配置
      dataset_path: /mnt/scimaster/shuotang/weiyu/roll_dev/data/nq_search_converted/train_converted.parquet
      max_instances: 2000  # H200显存充足，增加训练样本数
      
      # 检索服务器配置
      retrieval_server_url: http://127.0.0.1:8000/retrieve
      retrieval_timeout: 30
      retrieval_topk: 3
      return_scores: true
      
      # 限流配置
      max_concurrent_calls: 100 # H200显存充足，提升并发检索能力
      limiter_tag: nq_search_env
      disable_limiter: false
      
      # 环境设置
      max_steps: ${max_actions_per_traj}
      max_search_calls: 5
      
      # 动作解析模式
      think_pattern: <think>(.*?)</think>
      search_pattern: <search>(.*?)</search>
      answer_pattern: <answer>(.*?)</answer>
      
      # 奖励设置
      use_outcome_reward_only: true
      correct_answer_reward: 1.0
      step_penalty: 0.0
      invalid_action_penalty: 0.0
      
      # EM评估配置
      use_em_evaluation: true
      em_ignore_case: true
      em_ignore_punctuation: true
      em_ignore_articles: true
      
      # 特殊标记
      special_token_list: ["<think>", "</think>", "<search>", "</search>", "<answer>", "</answer>", "<information>", "</information>"]

  # 验证环境配置（使用测试集）
  NQSearchVal:
    env_type: nq_search
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_format}
    # 移除所有template，直接使用环境返回的observation（包含NQ问题）
    agent_system_template: ""  # 空字符串，避免null导致问题
    agent_template: "{state}"  # TrajEnvManager使用'state'而不是'observation'
    reward_template: ""  # 空字符串，不添加额外的reward反馈
    env_manager_cls: roll.pipeline.agentic.env_manager.traj_env_manager.TrajEnvManager
    use_thread_lock: true
    env_config:
      # 数据集配置 - 使用测试集
      dataset_path: /mnt/scimaster/shuotang/weiyu/roll_dev/data/nq_search_converted/test_converted.parquet
      max_instances: 1000  # H200显存充足，增加验证样本数
      
      # 检索服务器配置
      retrieval_server_url: http://127.0.0.1:8000/retrieve
      retrieval_timeout: 30
      retrieval_topk: 3
      return_scores: true
      
      # 限流配置
      max_concurrent_calls: 100 # H200显存充足，提升验证并发能力
      limiter_tag: nq_search_val_env
      disable_limiter: false
      
      # 环境设置
      max_steps: ${max_actions_per_traj}
      max_search_calls: 5
      
      # 动作解析模式
      think_pattern: <think>(.*?)</think>
      search_pattern: <search>(.*?)</search>
      answer_pattern: <answer>(.*?)</answer>
      
      # 奖励设置
      use_outcome_reward_only: true
      correct_answer_reward: 1.0
      step_penalty: 0.0
      invalid_action_penalty: 0.0
      
      # EM评估配置
      use_em_evaluation: true
      em_ignore_case: true
      em_ignore_punctuation: true
      em_ignore_articles: true
      
      # 特殊标记
      special_token_list: ["<think>", "</think>", "<search>", "</search>", "<answer>", "</answer>", "<information>", "</information>"]

# =============================================================================
# OFF-POLICY MONITORING CONFIGURATION
# =============================================================================
# Independent of replay buffer - can monitor fresh batches, replay batches, or both

offpolicy_monitor:
  enabled: true  # Enable off-policy monitoring

  # Behavior policy log probs computation
  save_behavior_log_probs: true  # Compute and save after rollout

  # Monitoring targets
  monitor_fresh_batch: true  # Monitor fresh rollout batches
  monitor_replay_batch: true  # Monitor replay buffer batches
  monitor_interval: 1  # Monitor every N steps

# =============================================================================
# TRAJECTORY REPLAY BUFFER CONFIGURATION
# =============================================================================
# Standard Prioritized Experience Replay (PER) following DeepMind 2016 paper
# See documentation: roll_dev/ROLL/docs/replay_buffer.md

replay:
  enabled: true
  capacity: 50000  # Max trajectories stored
  min_size: ${rollout_batch_size}  # Min samples before training
  train_steps_per_env_step: 2  # 每次 rollout 训练 2 次，提高样本利用率
  use_rollout_batch_size: true  # Use rollout_batch_size for sampling

  # Eviction Strategy
  eviction_strategy: "fifo"  # FIFO 是 PER 的标准实现 (OpenAI Baselines, RLlib)

  # ==========================================================================
  # Prioritized Experience Replay (PER) - Standard Configuration
  # ==========================================================================
  # 标准 PER 公式: P(i) = p_i^α / Σp_k^α
  # Importance Sampling: w_i = (N × P(i))^(-β) / max_w

  priority_function: "advantage"  # 使用 |advantage| 作为优先级 (标准 PER)
  priority_exponent: 0.6  # α: 0.6 是 DeepMind 推荐值 (0=uniform, 1=full prioritization)

  # Importance Sampling Correction (off-policy bias 修正)
  importance_sampling_correction: true  # 启用 IS 权重修正采样偏差
  importance_beta: 0.4  # β: 从 0.4 开始，应逐步退火到 1.0

  # Age Decay (可选，默认关闭以使用标准 PER)
  enable_age_decay: false  # 关闭 age decay，使用标准 PER
  age_decay: 1000.0  # 仅在 enable_age_decay=true 时生效

  # Other settings
  sampling_mode: "trajectory"  # trajectory | step
  storage_mode: tokens_only    # tokens_only | text_only | hybrid
  lazy_tokenization: false

