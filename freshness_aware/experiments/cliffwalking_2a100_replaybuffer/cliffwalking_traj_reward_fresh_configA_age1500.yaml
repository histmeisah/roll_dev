# ==============================================================================
# CLIFFWALKING - Trajectory Level + Reward-Fresh + Config A + Age1500
# ==============================================================================
# Purpose: Test conservative age_decay=1500 on CliffWalking (4x12 grid)
# Hardware: 2x A100 40GB
#
# Key Settings:
#   - Config A (verified on FrozenLake): advantage_clip=0.2, use_kl_loss=false
#   - reward_fresh priority with age_decay=1500 (conservative)
#   - CliffWalking: 4x12 grid, navigate from start to goal avoiding cliff
#
# Compare against cliffwalking_traj_baseline_configA for replay buffer effectiveness
# ==============================================================================
defaults:
  - ../../ROLL/examples/config/traj_envs@_here_
  - ../../ROLL/examples/config/deepspeed_zero@_here_
  - ../../ROLL/examples/config/deepspeed_zero2@_here_
  - ../../ROLL/examples/config/deepspeed_zero3@_here_
  - ../../ROLL/examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "cliffwalking_traj_reward_fresh_configA_age1500"
seed: 42
timestamp: ${oc.env:TRAINING_TIMESTAMP,${now:%Y%m%d_%H%M%S}}
base_output_dir: /mnt/nasdata/weiyu/roll_dev/experiments/cliffwalking_2a100_replaybuffer/output
logging_dir: ${base_output_dir}/${timestamp}/logs
output_dir: ${base_output_dir}/${timestamp}
render_save_dir: ${base_output_dir}/${timestamp}/render
system_envs:
  USE_MODELSCOPE: '1'

track_with: wandb
tracker_kwargs:
  project: roll-cliffwalking-2a100
  name: ${timestamp}_${exp_name}
  notes: "Config A + Reward-Fresh + age_decay=1500: Conservative decay on CliffWalking 4x12"
  tags: [agentic, roll, cliffwalking, replay, traj, reward_fresh, configA, age1500, 2a100]
  mode: offline
  dir: ${base_output_dir}/${timestamp}/wandb

checkpoint_config:
  type: file_system
  output_dir: ${base_output_dir}/${timestamp}/models/${exp_name}

# =============================================================================
# TRAINING CONFIGURATION - Config A (Verified Working)
# =============================================================================

num_gpus_per_node: 2

max_steps: 400
save_steps: 10000
logging_steps: 1
eval_steps: 10
resume_from_checkpoint: false

train_from_replay_only: false
batch_adjust_mode: auto
async_generation_ratio: 1

rollout_batch_size: 128
val_batch_size: 128
sequence_length: 2048

# ===================== CONFIG A CORE PARAMETERS =====================
advantage_clip: 0.2
ppo_epochs: 1
adv_estimator: "reinforce"
init_kl_coef: 0.0
use_kl_loss: false
kl_loss_coef: 0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0
# ====================================================================

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================

pretrain: /mnt/nasdata/weiyu/llm_model/qwen_models/Qwen2.5-0.5B-Instruct
reward_pretrain: /mnt/nasdata/weiyu/llm_model/qwen_models/Qwen2.5-0.5B-Instruct

actor_train:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 32
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero2}
  device_mapping: list(range(0,1))
  infer_batch_size: 4

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: 128
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.85
      block_size: 16
      load_format: auto
  device_mapping: list(range(1,2))

reference:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: list(range(0,1))
  infer_batch_size: 4

# =============================================================================
# ENVIRONMENT CONFIGURATION - CliffWalking (Trajectory Level)
# =============================================================================

action_pattern: <answer>(.*?)</answer>
think_action_pattern: <think>(.*?)</think>\s*<answer>(.*?)</answer>
user_prompt_no_think_format: <answer> [your answer] </answer>
user_prompt_think_format: <think> [Your thoughts] </think> <answer> [your answer] </answer>

max_tokens_per_step: 128
max_actions_per_traj: 200

reward_normalization:
  grouping: traj_group_id
  method: mean_std

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 16
  num_env_groups: 64
  group_size: 2
  tags: [CliffWalking]
  num_groups_partition: [64]

val_env_manager:
  max_env_num_per_worker: 32
  num_env_groups: 128
  group_size: 1
  tags: [CliffWalking]
  num_groups_partition: [128]

custom_envs:
  CliffWalking:
    env_type: cliff_walking
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_no_think_format}
    agent_system_template: "You are an agent navigating a cliff walking grid. Reach the goal at the bottom-right while avoiding the cliff. Output must be wrapped as <answer>Action</answer>."
    agent_template: |
      Current turn: {turn_idx}
      Board state:
      {state}
      Actions left: {actions_left}
      Respond with one action token only, within {max_response_length} tokens.
    reward_template: "Feedback: Your previous action received reward {reward}. Revise your plan if needed."
    env_manager_cls: roll.pipeline.agentic.env_manager.traj_env_manager.TrajEnvManager
    use_thread_lock: true
    env_config:
      env_instruction: "You are navigating the CliffWalking grid (4 rows x 12 columns). You start at the bottom-left corner and must reach the goal at the bottom-right corner. The bottom edge between start and goal is a cliff. Stepping on the cliff gives -100 reward and sends you back to start. Each normal step gives -1 reward. Reaching the goal ends the episode. The answer must be one of action in a turn, format is <answer>Right</answer>"
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}

# =============================================================================
# OFF-POLICY MONITORING
# =============================================================================

offpolicy_monitor:
  enabled: true
  save_behavior_log_probs: true
  monitor_fresh_batch: true
  monitor_replay_batch: true
  monitor_interval: 1

# =============================================================================
# TRAJECTORY LOGGING (for debugging and analysis)
# =============================================================================

trajectory_log:
  enabled: true
  save_ratio: 0.1
  max_samples_per_step: 20
  filename: trajectory_samples.jsonl

# =============================================================================
# REPLAY BUFFER - Reward-Fresh with age_decay=1500 (Conservative)
# =============================================================================
# Formula: priority = (|reward| + epsilon) * exp(-age / age_decay)
#
# Age decay with age_decay=1500:
#   - Age 0:    weight = 1.0   (100%)
#   - Age 400:  weight = 0.77  (77%)  <- end of training
#   - Age 1000: weight = 0.51  (51%)
#   - Age 1040: weight = 0.5   (50% - half-life)
#   - Age 1500: weight = 0.37  (37%)
# =============================================================================

replay:
  enabled: true
  capacity: 50000
  min_size: ${rollout_batch_size}
  train_steps_per_env_step: 2
  use_rollout_batch_size: true
  sampling_mode: "trajectory"
  storage_mode: tokens_only
  lazy_tokenization: false
  eviction_strategy: "fifo"

  # Reward-Fresh: our custom priority function
  priority_function: "reward_fresh"
  priority_exponent: 0.6

  # Age decay parameter - conservative, slow decay
  enable_age_decay: true
  age_decay: 1500.0

  # Importance Sampling Correction
  importance_sampling_correction: false
  importance_beta: 0.4
