# ==============================================================================
# FROZENLAKE TRAINING - Trajectory Replay Buffer + old_prob(turn + engine)
# ==============================================================================
defaults:
  - ../../ROLL/examples/config/traj_envs@_here_
  - ../../ROLL/examples/config/deepspeed_zero@_here_
  - ../../ROLL/examples/config/deepspeed_zero2@_here_
  - ../../ROLL/examples/config/deepspeed_zero3@_here_
  - ../../ROLL/examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "agentic_pipeline"
seed: 42
timestamp: ${oc.env:TRAINING_TIMESTAMP,${now:%Y%m%d_%H%M%S}}
base_output_dir: /mnt/scimaster/shuotang/weiyu/roll_dev/experiments/reproduce_frozen_lake_replay/output
logging_dir: ${base_output_dir}/${timestamp}/logs
output_dir: ${base_output_dir}/${timestamp}
render_save_dir: ${base_output_dir}/${timestamp}/render
system_envs:
  USE_MODELSCOPE: '1'

track_with: wandb
tracker_kwargs:
  project: roll-agentic-replay
  name: ${timestamp}_${exp_name}_trajrb_turn_engine_oldprob_engine
  notes: "Trajectory ReplayBuffer + old_prob(turn+engine)"
  tags: [agentic, roll, frozen_lake, replay, traj_rb, step_oldprob, engine]
  mode: offline
  dir: ${base_output_dir}/${timestamp}/wandb

checkpoint_config:
  type: file_system
  output_dir: ${base_output_dir}/${timestamp}/models/${exp_name}

# =============================================================================
# TRAINING CONFIGURATION
# =============================================================================

num_gpus_per_node: 8

max_steps: 100
save_steps: 10000
logging_steps: 1
eval_steps: 5
resume_from_checkpoint: false

train_from_replay_only: false
batch_adjust_mode: auto
async_generation_ratio: 1

# Batch and sequence settings
rollout_batch_size: 128
val_batch_size: 128
sequence_length: 4096

# RL algorithm settings
advantage_clip: 0.2
ppo_epochs: 1
adv_estimator: "reinforce"
init_kl_coef: 0.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================

pretrain: /mnt/scimaster/model/Qwen2.5-7B-Instruct/qwen2.5-7b-instruct
reward_pretrain: /mnt/scimaster/model/Qwen2.5-7B-Instruct/qwen2.5-7b-instruct

actor_train:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 16
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero3}
  device_mapping: list(range(0,4))
  infer_batch_size: 2

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: 128
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.8
      block_size: 16
      load_format: auto
  device_mapping: list(range(4,8))

reference:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: list(range(0,4))
  infer_batch_size: 2

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================

action_pattern: <answer>(.*?)</answer>
think_action_pattern: <think>(.*?)</think>\s*<answer>(.*?)</answer>
user_prompt_no_think_format: <answer> [your answer] </answer>
user_prompt_think_format: <think> [Your thoughts] </think> <answer> [your answer] </answer>


max_tokens_per_step: 128
max_actions_per_traj: 10

reward_normalization:
  grouping: traj_group_id
  method: mean_std

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 16
  num_env_groups: 128
  group_size: 8
  tags: [FrozenLake]
  num_groups_partition: [128]

val_env_manager:
  max_env_num_per_worker: 32
  num_env_groups: 1024
  group_size: 1
  tags: [FrozenLake]
  num_groups_partition: [1024]

custom_envs:
  FrozenLake:
    env_type: frozen_lake
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_no_think_format}
    agent_system_template: "You are an agent solving the FrozenLake puzzle. Output must be wrapped as <answer>Action</answer>."
    agent_template: |
      Current turn: {turn_idx}
      Grid state:
      {state}
      Actions left: {actions_left}
      Respond with one action token only, within {max_response_length} tokens.
    reward_template: "Feedback: Your previous action received reward {reward}. Revise your plan if needed."
    env_manager_cls: roll.pipeline.agentic.env_manager.traj_env_manager.TrajEnvManager
    use_thread_lock: true
    env_config:
      env_instruction: "You are solving the FrozenLake puzzle. Forbid the whole and go to the target. You may move to the unintended direction due to the slippery ice. The answer must be one of action in a turn, format is <answer>Right</answer>"
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      is_slippery: false

# =============================================================================
# OFF-POLICY MONITORING CONFIGURATION
# =============================================================================
# Independent of replay buffer - can monitor fresh batches, replay batches, or both

offpolicy_monitor:
  enabled: true  # Enable off-policy monitoring

  # Behavior policy log probs computation
  save_behavior_log_probs: true  # Compute and save after rollout

  # Monitoring targets
  monitor_fresh_batch: true  # Monitor fresh rollout batches
  monitor_replay_batch: true  # Monitor replay buffer batches
  monitor_interval: 1  # Monitor every N steps

# =============================================================================
# TRAJECTORY REPLAY BUFFER CONFIGURATION
# =============================================================================

replay:
  enabled: false
  capacity: 100000  # Max trajectories in buffer
  min_size: ${rollout_batch_size}  # Start sampling when buffer has this many samples
  train_steps_per_env_step: 1  # Additional training steps per rollout step
  use_rollout_batch_size: true  # Use rollout_batch_size for replay sampling
  sampling_mode: "trajectory"  # trajectory (full episodes) | step (per-step sampling)
  sample_method: lifo  # lifo (newest) | fifo (oldest) | uniform (random)
  storage_mode: tokens_only  # tokens_only | text_only | hybrid
  lazy_tokenization: false  # Tokenize during storage (false) or sampling (true)


