# ===============================================================================
# REPLAY BUFFER CONFIGURATION FOR FROZENLAKE (supports trajectory-level replay and FIFO/LIFO sampling)
# ===============================================================================
#
# This configuration drives training via the Replay Buffer. It supports two sampling granularities:
# - trajectory: sample full episodes from buffer
# - step:       sample contiguous K-step windows
#
# And three storage modes:
# - hybrid:     store text + tokens（开发期推荐）
# - text_only:  仅存文本，采样时再分词（省内存）
# - tokens_only:仅存tokens（最快）
#
# Quick Start:
# 1. Default hybrid mode works out of the box
# 2. For memory constraints: uncomment text_only mode in replay section
# 3. For pure training speed: uncomment tokens_only mode in replay section
# 4. Monitor metrics: replay_buffer/storage_mode, replay_buffer/step_transitions
#
# ===============================================================================
defaults:
  - ../../ROLL/examples/config/traj_envs@_here_
  - ../../ROLL/examples/config/deepspeed_zero@_here_
  - ../../ROLL/examples/config/deepspeed_zero2@_here_
  - ../../ROLL/examples/config/deepspeed_zero3@_here_
  - ../../ROLL/examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "agentic_pipeline"
seed: 42
timestamp: ${oc.env:TRAINING_TIMESTAMP,${now:%Y%m%d_%H%M%S}}
base_output_dir: /data1/Chengyang_project/roll_dev/experiments/reproduce_frozen_lake_replay/output
logging_dir: ${base_output_dir}/${timestamp}/logs
output_dir: ${base_output_dir}/${timestamp}
render_save_dir: ${base_output_dir}/${timestamp}/render
system_envs:
  USE_MODELSCOPE: '1'

track_with: wandb
tracker_kwargs:
  project: roll-agentic-replay
  name: ${timestamp}_${exp_name}_step_buffer_hybrid
  notes: "Step-based Replay: hybrid storage, 100K transitions, ROLL-native tokenization"
  tags: [agentic, roll, frozen_lake, step_based, hybrid, optimized, v3]
  mode: offline
  dir: ${base_output_dir}/${timestamp}/wandb

checkpoint_config:
  type: file_system
  output_dir: ${base_output_dir}/${timestamp}/models/${exp_name}

# =============================================================================
# TRAINING CONFIGURATION
# =============================================================================

num_gpus_per_node: 8

# Training schedule (optimized for step-based replay buffer testing)
max_steps: 100                    # Quick test (recommended: 1000+ for full training)
save_steps: 10000                # Checkpoint frequency
logging_steps: 1                 # Log every step (change to 10 for production)
eval_steps: 5                    # Evaluate every 5 steps (good for replay buffer monitoring)
resume_from_checkpoint: false

# Enable replay-only training at the top level
train_from_replay_only: true

# 🔧 修复batch size问题：使用auto模式（ROLL官方推荐）
batch_adjust_mode: auto          # auto模式会根据batch大小智能选择copy或delete

# Generation settings
async_generation_ratio: 1        # Full async generation

# Batch and sequence settings (reduced for memory efficiency)
rollout_batch_size: 1024         # Restored to 1024 to fix batch adjustment
val_batch_size: 1024              # Reduced from 1024 to save memory
sequence_length: 4096            # Reduced from 8192 to save memory

# RL algorithm settings
advantage_clip: 0.2              # PPO advantage clipping
ppo_epochs: 1                    # Single epoch for stability
adv_estimator: "reinforce"       # REINFORCE advantage estimation
init_kl_coef: 0.0               # No KL penalty
whiten_advantages: true          # Normalize advantages
entropy_loss_coef: 0            # No entropy bonus
max_grad_norm: 1.0              # Gradient clipping

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================

pretrain: /data1/Chengyang_project/Models/downloaded_models/Qwen2.5-0.5B-Instruct
reward_pretrain: /data1/Chengyang_project/Models/downloaded_models/Qwen2.5-0.5B-Instruct

actor_train:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 128
    warmup_steps: 10
    lr_scheduler_type: cosine
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      recompute_granularity: full
  device_mapping: list(range(0,4))
  infer_batch_size: 2

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: 128
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.8
      block_size: 16
      load_format: auto
  device_mapping: list(range(4,8))

reference:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  data_args:
    template: qwen2_5
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: list(range(0,4))
  infer_batch_size: 2

# =============================================================================
# ENVIRONMENT CONFIGURATION  
# =============================================================================

# Action format patterns
action_pattern: <answer>(.*?)</answer>
think_action_pattern: <think>(.*?)</think>\s*<answer>(.*?)</answer>
user_prompt_no_think_format: <answer> [your answer] </answer>
user_prompt_think_format: <think> [Your thoughts] </think> <answer> [your answer] </answer>


# Environment limits
max_tokens_per_step: 256         # Max tokens per response
max_actions_per_traj: 10         # Max steps per episode

# Reinforce 通常不做分组归一化；参考官方 AMD 配置（examples/qwen2.5-7B-agentic_megatron/agentic_val_webshop_amd.yaml）
# 这里关闭 reward_normalization，避免 replay-only 采样下每组仅1条导致 mean/std 退化
reward_normalization:
  grouping: tags
  method: identity

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 16
  num_env_groups: 128
  group_size: 8
  tags: [FrozenLake]
  num_groups_partition: [128]

val_env_manager:
  max_env_num_per_worker: 32
  num_env_groups: 1024
  group_size: 1
  tags: [FrozenLake]
  num_groups_partition: [1024]

custom_envs:
  FrozenLake:
    env_type: frozen_lake
    max_tokens_per_step: ${max_tokens_per_step}
    user_prompt_format: ${user_prompt_no_think_format}
    agent_system_template: "You are an agent solving the FrozenLake puzzle. Output must be wrapped as <answer>Action</answer>."
    agent_template: |
      Current turn: {turn_idx}
      Grid state:
      {state}
      Actions left: {actions_left}
      Respond with one action token only, within {max_response_length} tokens.
    reward_template: "Feedback: Your previous action received reward {reward}. Revise your plan if needed."
    env_manager_cls: roll.pipeline.agentic.env_manager.traj_env_manager.TrajEnvManager
    use_thread_lock: true
    env_config:
      env_instruction: "You are solving the FrozenLake puzzle. Forbid the whole and go to the target. You may move to the unintended direction due to the slippery ice. The answer must be one of action in a turn, format is <answer>Right</answer>"
      action_pattern: ${action_pattern}
      max_steps: ${max_actions_per_traj}
      is_slippery: false

# =============================================================================
# STEP-BASED REPLAY BUFFER CONFIGURATION
# =============================================================================

replay:
  # 基本设置
  enabled: true                 # 启用 Replay Buffer（关闭则完全 on-policy）
  
  # 容量与训练节奏（step 级而非 episode 级）
  capacity: 100000              # 缓冲容量（按step计数）
  min_size: 512                 # 预热阈值（>=此值才进行重放训练）
  train_steps_per_env_step: 1   # 每个 rollout step 附加的重放训练步数
  minibatch_size: 1024          # 重放 minibatch 大小（建议小于等于 rollout_batch_size）
  
  # 批对齐（兼容并行器）
  use_rollout_batch_size: true  # 若为 true，则采样批大小使用 rollout_batch_size
  
  # Fresh/Replay 混合（仅影响 integrate 阶段的日志与可视化，对重放训练步不生效）
  replay_ratio: 0.1             # 取 fresh_batch_size * replay_ratio 条重放样本并与 fresh concat（用于观测）
  
  # 采样粒度与顺序
  sampling_mode: trajectory      # trajectory:整轨 | step:K步窗口
  steps_per_episode: ${max_actions_per_traj}   # step模式下窗口K；trajectory模式下为整轨（可忽略）
  sample_method: fifo            # uniform | fifo(老→新) | lifo(新→老)
  # 仅使用 Replay Buffer 更新（fresh 仅入库）
  
  # =========================================================================== 
  # STORAGE MODE CONFIGURATION - Choose one configuration below
  # ===========================================================================
  
  # 存储模式（推荐 hybrid；若追求极致速度可 tokens_only）
  storage_mode: tokens_only
  lazy_tokenization: false
  
  # 💾 TEXT-ONLY MODE (Uncomment for memory efficiency)
  # storage_mode: text_only     # Stores only text, tokens computed on-demand
  # lazy_tokenization: false   # false=pre-tokenize | true=tokenize-on-demand
  
  # ⚡ TOKENS-ONLY MODE (Uncomment for pure training performance)
  # storage_mode: tokens_only   # Stores only tokens, no text analysis capability
  # lazy_tokenization: false   # Not used in tokens_only mode

# =============================
# REPLAY-ONLY TRAINING SWITCH（说明）
# =============================
# 将训练更新切换为“仅使用 Replay Buffer 的 minibatch”；fresh 仅 rollout+入库。
# 近似“100%重放训练”建议：
# - replay.enabled: true
# - replay.min_size: 512（或更高，确保热身）
# - replay.minibatch_size: 128~256（更稳）
# - replay.train_steps_per_env_step: 4~8（逐步增大）
# - sampling_mode: trajectory（先稳）
# - sample_method: fifo（近似在线，或 uniform 先稳）



